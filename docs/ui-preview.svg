<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="1198" height="678" rx="14" fill="#0b0f14" stroke="#1e2937"/>

  <!-- title bar -->
  <circle cx="26" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="20" r="6" fill="#27c93f"/>
  <text x="600" y="24" text-anchor="middle" fill="#5d7185" font-size="12">AI Co-Founder — localhost</text>

  <!-- top bar -->
  <rect x="1" y="38" width="1198" height="48" fill="#0c121b"/>
  <rect x="24" y="54" width="16" height="16" rx="4" fill="none" stroke="#7dd3fc" stroke-width="2" transform="rotate(45 32 62)"/>
  <text x="52" y="68" fill="#e7eef7" font-size="16" font-weight="700">AI Co-Founder</text>
  <rect x="178" y="52" width="74" height="20" rx="10" fill="none" stroke="#1e2937"/>
  <text x="215" y="66" text-anchor="middle" fill="#7dd3fc" font-size="11">localhost</text>
  <circle cx="1108" cy="62" r="5" fill="#4ade80"/>
  <text x="1120" y="66" fill="#8aa0b8" font-size="12">connected</text>

  <!-- divider -->
  <line x1="500" y1="86" x2="500" y2="680" stroke="#1e2937"/>
  <line x1="1" y1="86" x2="1199" y2="86" stroke="#1e2937"/>

  <!-- ===== left: setup wizard ===== -->
  <rect x="1" y="86" width="499" height="593" fill="#070a0f"/>
  <text x="28" y="122" fill="#e7eef7" font-size="20" font-weight="700">Set up your AI Co-Founder</text>
  <text x="28" y="146" fill="#8aa0b8" font-size="12.5">A few one-time steps — just click the buttons.</text>

  <!-- env pills -->
  <g font-size="11">
    <rect x="28"  y="162" width="64"  height="22" rx="11" fill="#0e141d" stroke="#1e2937"/><text x="60"  y="177" text-anchor="middle" fill="#8aa0b8">macOS</text>
    <rect x="100" y="162" width="78"  height="22" rx="11" fill="#0e141d" stroke="#1e2937"/><text x="139" y="177" text-anchor="middle" fill="#8aa0b8">Node v20</text>
    <rect x="186" y="162" width="118" height="22" rx="11" fill="#0e141d" stroke="#1f4030"/><text x="245" y="177" text-anchor="middle" fill="#4ade80">Claude 2.1.195</text>
    <rect x="312" y="162" width="50"  height="22" rx="11" fill="#0e141d" stroke="#1f4030"/><text x="337" y="177" text-anchor="middle" fill="#4ade80">Max</text>
  </g>

  <!-- step cards -->
  <g>
    <!-- card template repeated -->
    <g>
      <rect x="28" y="200" width="444" height="58" rx="11" fill="#0e141d" stroke="#1f4030"/>
      <circle cx="58" cy="229" r="15" fill="#12301f" stroke="#1f4030"/>
      <path d="M51 229 l5 5 l9 -11" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="234" fill="#d6deeb" font-size="14.5" font-weight="600">Check your computer</text>
      <rect x="402" y="218" width="56" height="22" rx="11" fill="#12301f"/><text x="430" y="233" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Done</text>
    </g>
    <g>
      <rect x="28" y="266" width="444" height="58" rx="11" fill="#0e141d" stroke="#1f4030"/>
      <circle cx="58" cy="295" r="15" fill="#12301f" stroke="#1f4030"/>
      <path d="M51 295 l5 5 l9 -11" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="300" fill="#d6deeb" font-size="14.5" font-weight="600">Install Claude Code</text>
      <rect x="402" y="284" width="56" height="22" rx="11" fill="#12301f"/><text x="430" y="299" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Done</text>
    </g>
    <g>
      <rect x="28" y="332" width="444" height="58" rx="11" fill="#0e141d" stroke="#1f4030"/>
      <circle cx="58" cy="361" r="15" fill="#12301f" stroke="#1f4030"/>
      <path d="M51 361 l5 5 l9 -11" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="366" fill="#d6deeb" font-size="14.5" font-weight="600">Add co-founder skills</text>
      <rect x="402" y="350" width="56" height="22" rx="11" fill="#12301f"/><text x="430" y="365" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Done</text>
    </g>
    <g>
      <rect x="28" y="398" width="444" height="58" rx="11" fill="#0e141d" stroke="#1f4030"/>
      <circle cx="58" cy="427" r="15" fill="#12301f" stroke="#1f4030"/>
      <path d="M51 427 l5 5 l9 -11" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="432" fill="#d6deeb" font-size="14.5" font-weight="600">Sign in to Claude</text>
      <rect x="402" y="416" width="56" height="22" rx="11" fill="#12301f"/><text x="430" y="431" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Done</text>
    </g>
  </g>

  <!-- launch -->
  <text x="28" y="490" fill="#8aa0b8" font-size="12.5">All steps done — you’re ready.</text>
  <rect x="28" y="502" width="444" height="50" rx="11" fill="url(#btn)"/>
  <text x="250" y="533" text-anchor="middle" fill="#06202c" font-size="15" font-weight="700">Launch my Co-Founder</text>
  <path d="M356 527 l10 6 l-10 6 z" fill="#06202c"/>

  <!-- ===== right: live session ===== -->
  <!-- terminal bar -->
  <rect x="500" y="86" width="699" height="34" fill="#0c1119"/>
  <rect x="522" y="96" width="13" height="13" rx="2" fill="#7dd3fc" transform="rotate(45 528 102)"/>
  <text x="548" y="108" fill="#8aa0b8" font-size="12.5" font-family="SFMono-Regular, Consolas, monospace">Claude — your co-founder</text>
  <circle cx="1176" cy="103" r="5" fill="#4ade80"/>

  <!-- terminal body -->
  <rect x="500" y="120" width="699" height="418" fill="#0b0f14"/>
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="13">
    <text x="524" y="150" fill="#5d7185">Welcome back — Claude Max · effort: high</text>
    <text x="524" y="182" fill="#7dd3fc">›  Validate my coffee subscription idea</text>
    <text x="524" y="214" fill="#cdd7e3">Idea: a monthly specialty-coffee subscription for remote</text>
    <text x="524" y="234" fill="#cdd7e3">workers — a reliable daily ritual delivered to the door.</text>
    <text x="524" y="266" fill="#4ade80">Riskiest assumptions</text>
    <text x="524" y="288" fill="#cdd7e3">1.  People will pay monthly vs. buying ad hoc</text>
    <text x="524" y="308" fill="#cdd7e3">2.  Beans can be sourced at a margin that works</text>
    <text x="524" y="340" fill="#4ade80">Cheapest test this week</text>
    <text x="524" y="362" fill="#cdd7e3">A simple landing page + 5 customer interviews to gauge</text>
    <text x="524" y="382" fill="#cdd7e3">willingness to pay before you source a single bag.</text>
    <text x="524" y="414" fill="#8aa0b8">Recommendation:  refine → test demand first.</text>
    <rect x="524" y="430" width="9" height="16" fill="#7dd3fc" opacity="0.85"/>
  </g>

  <!-- compose box -->
  <rect x="500" y="538" width="699" height="141" fill="#0c1119"/>
  <line x1="500" y1="538" x2="1199" y2="538" stroke="#1e2937"/>
  <text x="524" y="566" fill="#8aa0b8" font-size="11">Answer a prompt:</text>
  <g font-size="12" font-family="SFMono-Regular, Consolas, monospace">
    <rect x="628" y="554" width="58" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="657" y="568" text-anchor="middle" fill="#d6deeb">Enter</text>
    <rect x="692" y="554" width="42" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="713" y="568" text-anchor="middle" fill="#d6deeb">Esc</text>
    <rect x="740" y="554" width="30" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="755" y="568" text-anchor="middle" fill="#d6deeb">↑</text>
    <rect x="776" y="554" width="30" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="791" y="568" text-anchor="middle" fill="#d6deeb">↓</text>
    <rect x="812" y="554" width="44" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="834" y="568" text-anchor="middle" fill="#d6deeb">Yes</text>
    <rect x="862" y="554" width="40" height="20" rx="6" fill="#131b26" stroke="#1e2937"/><text x="882" y="568" text-anchor="middle" fill="#d6deeb">No</text>
  </g>
  <rect x="524" y="584" width="556" height="72" rx="10" fill="#0e141d" stroke="#38bdf8"/>
  <text x="540" y="616" fill="#cdd7e3" font-size="14">Draft a one-week plan to interview 5 potential customers</text>
  <text x="540" y="640" fill="#5d7185" font-size="12">Enter to send · Shift+Enter for a new line</text>
  <rect x="1092" y="584" width="84" height="72" rx="10" fill="url(#btn)"/>
  <text x="1134" y="625" text-anchor="middle" fill="#06202c" font-size="14" font-weight="700">Send</text>
</svg>
